name: Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to rollback'
        required: true
        type: choice
        options:
          - staging
          - production
      version:
        description: 'Version to rollback to'
        required: true

jobs:
  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          VITE_APP_ENV: ${{ github.event.inputs.environment }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ github.event.inputs.environment == 'production' && secrets.AZURE_CLIENT_ID_PROD || secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ github.event.inputs.environment == 'production' && secrets.AZURE_SUBSCRIPTION_ID_PROD || secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy rollback
        uses: azure/cli@v2
        with:
          inlineScript: |
            STORAGE_ACCOUNT=${{ github.event.inputs.environment == 'production' && vars.AZURE_STORAGE_ACCOUNT_PROD || vars.AZURE_STORAGE_ACCOUNT_STAGING }}
            CDN_PROFILE=${{ github.event.inputs.environment == 'production' && vars.AZURE_CDN_PROFILE_PROD || vars.AZURE_CDN_PROFILE_STAGING }}
            CDN_ENDPOINT=${{ github.event.inputs.environment == 'production' && vars.AZURE_CDN_ENDPOINT_PROD || vars.AZURE_CDN_ENDPOINT_STAGING }}

            az storage blob upload-batch \
              --account-name $STORAGE_ACCOUNT \
              --destination '$web' \
              --source dist/ \
              --overwrite

            az cdn endpoint purge \
              --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
              --profile-name $CDN_PROFILE \
              --name $CDN_ENDPOINT \
              --content-paths "/*"

      - name: Verify rollback
        run: |
          sleep 60
          URL=${{ github.event.inputs.environment == 'production' && 'https://app.example.com' || 'https://staging.example.com' }}
          curl -f $URL/health || exit 1

      - name: Notify rollback
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Rollback completed for ${{ github.event.inputs.environment }}: ${{ github.event.inputs.version }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
